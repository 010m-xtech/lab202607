<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, orientation=landscape">
  <title>QUIZ TIME SHOCK!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; background: #111; font-family: 'Arial Black', sans-serif; color: #fff; }

    /* 横向き推奨画面 */
    #rotate-message {
      position: fixed; inset: 0; background: #000; z-index: 999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    @media screen and (orientation: landscape) {
      #rotate-message { display: none; }
    }

    /* メインコンテナ */
    #game-container {
      position: relative; width: 100%; height: 100%;
      display: flex; padding: 20px; gap: 20px;
      background: radial-gradient(circle, #1a2a6c, #b21f1f, #fdbb2d);
      background-size: 400% 400%;
      animation: bgGlow 15s ease infinite;
    }
    @keyframes bgGlow { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }

    /* 左側：時計メーター */
    .left-side { flex: 1; display: flex; align-items: center; justify-content: center; }
    .clock-dial {
      position: relative; width: 280px; height: 280px;
      border: 8px solid #333; border-radius: 50%;
      background: rgba(0,0,0,0.8); box-shadow: 0 0 30px rgba(0,0,0,0.7);
    }
    .num-lamp {
      position: absolute; width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: bold; border-radius: 50%;
      background: #222; color: #555; transform: translate(-50%, -50%);
    }
    .num-lamp.current { background: #ffc107; color: #000; box-shadow: 0 0 15px #ffc107; }
    .num-lamp.correct { background: #4caf50; color: #fff; box-shadow: 0 0 15px #4caf50; }
    .num-lamp.wrong { background: #f44336; color: #fff; box-shadow: 0 0 15px #f44336; }

    .clock-center {
      position: absolute; inset: 0; margin: auto;
      width: 120px; height: 120px; border-radius: 50%;
      background: #000; border: 3px solid #555;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .time-display { font-size: 32px; color: #00ffcc; text-shadow: 0 0 10px #00ffcc; }
    .score-display { font-size: 14px; color: #aaa; margin-top: 5px; }

    /* 右側：クイズエリア */
    .right-side { flex: 1.5; display: flex; flex-direction: column; justify-content: space-between; padding: 10px 0; }
    .quiz-box {
      background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px;
      border-left: 5px solid #ffc107; min-height: 80px; display: flex; align-items: center;
    }
    .quiz-text { font-size: 18px; line-height: 1.4; font-family: sans-serif; }

    .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .choice-btn {
      padding: 15px; font-size: 16px; font-weight: bold; color: #fff;
      background: linear-gradient(135deg, #333, #222);
      border: 2px solid #555; border-radius: 8px; cursor: pointer;
      transition: all 0.1s ease; font-family: sans-serif;
    }
    .choice-btn:active { transform: scale(0.98); background: #555; }

    /* タイムショック演出 */
    .time-shock-active { animation: shake 0.1s infinite !important; background: #ff0000 !important; }
    @keyframes shake {
      0% { transform: translate(3px, 3px) rotate(0deg); }
      100% { transform: translate(-3px, -3px) rotate(0deg); }
    }

    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.95);
      z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    }
    .menu-btn {
      padding: 15px 40px; font-size: 20px; font-weight: bold; background: #ffc107;
      color: #111; border: none; border-radius: 30px; cursor: pointer; box-shadow: 0 5px 15px rgba(255,193,7,0.4);
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="rotate-message">
    <p style="font-size: 24px; margin-bottom: 10px;">🔄 スマホを【横向き】にしてください</p>
  </div>

  <div id="start-overlay" class="overlay">
    <h1 style="font-size: 42px; color: #ffc107; text-shadow: 0 0 20px #ffc107;">QUIZ TIME SHOCK</h1>
    <p style="color: #aaa; font-family: sans-serif;">1分間 12問の地獄のクイズに挑め！</p>
    <button class="menu-btn" onclick="startGame()">LET'S LIFT THE QUIZ!</button>
  </div>

  <div id="result-overlay" class="overlay hidden">
    <h1 id="result-title" style="font-size: 36px;">GAME OVER</h1>
    <p id="result-desc" style="font-size: 20px; font-family: sans-serif; white-space: pre-wrap; text-align: center;"></p>
    <button class="menu-btn" onclick="hideResult()">もう一度挑む</button>
  </div>

  <div id="game-container">
    <div class="left-side">
      <div class="clock-dial" id="dial">
        <div class="clock-center">
          <div class="time-display" id="timer-text">60</div>
          <div class="score-display" id="correct-text">正解: 0/12</div>
        </div>
      </div>
    </div>

    <div class="right-side">
      <div class="quiz-box">
        <p class="quiz-text" id="quiz-question">問題がここに表示されます。</p>
      </div>
      <div class="choices-grid">
        <button class="choice-btn" onclick="selectAnswer(0)" id="btn0">選択肢1</button>
        <button class="choice-btn" onclick="selectAnswer(1)" id="btn1">選択肢2</button>
        <button class="choice-btn" onclick="selectAnswer(2)" id="btn2">選択肢3</button>
        <button class="choice-btn" onclick="selectAnswer(3)" id="btn3">選択肢4</button>
      </div>
    </div>
  </div>

  <script>
    const quizData = [
      { q: "Q1: 日本で一番高い山はどこ？", c: ["富士山", "北岳", "奥穂高岳", "槍ヶ岳"], a: 0 },
      { q: "Q2: 信号機の「進め」は何色？", c: ["赤", "黄色", "青", "ピンク"], a: 2 },
      { q: "Q3: 1年は何ヶ月？", c: ["10ヶ月", "11ヶ月", "12ヶ月", "13ヶ月"], a: 2 },
      { q: "Q4: トライアングルの角の数はいくつ？", c: ["2つ", "3つ", "4つ", "5つ"], a: 1 },
      { q: "Q5: 水素の元素記号はどれ？", c: ["H", "O", "C", "N"], a: 0 },
      { q: "Q6: 英語で「林檎（リンゴ）」は何という？", c: ["Banana", "Orange", "Apple", "Grape"], a: 2 },
      { q: "Q7: 日本の現在の首都はどこ？", c: ["京都", "大阪", "東京", "神奈川"], a: 2 },
      { q: "Q8: サッカーの1チームの人数は何人？", c: ["9人", "11人", "15人", "22人"], a: 1 },
      { q: "Q9: 一方通行の標識に描かれている矢印の色は？", c: ["赤", "白", "青", "黒"], a: 1 },
      { q: "Q10: 地球の周りを回っている唯一の自然衛星は？", c: ["太陽", "火星", "月", "金星"], a: 2 },
      { q: "Q11: 将棋の駒で、斜め後ろに動けないのはどれ？", c: ["飛車", "角行", "王将", "歩兵"], a: 3 },
      { q: "Q12: クイーンの冠、クイズの制限時間は合計何秒？", c: ["30秒", "45秒", "60秒", "90秒"], a: 2 }
    ];

    let currentQuestionIdx = 0;
    let correctCount = 0;
    let totalTime = 60;
    let gameInterval = null;
    let questionResults = [];

    // 時計ランプ生成
    const dial = document.getElementById('dial');
    for (let i = 1; i <= 12; i++) {
      const lamp = document.createElement('div');
      lamp.className = 'num-lamp';
      lamp.id = `lamp-${i}`;
      lamp.innerText = i;
      const angle = (i * 30 - 90) * (Math.PI / 180);
      const radius = 110;
      const x = 140 + radius * Math.cos(angle);
      const y = 140 + radius * Math.sin(angle);
      lamp.style.left = `${x}px`;
      lamp.style.top = `${y}px`;
      dial.appendChild(lamp);
    }

    function startGame() {
      document.getElementById('start-overlay').classList.add('hidden');
      currentQuestionIdx = 0;
      correctCount = 0;
      totalTime = 60;
      questionResults = Array(12).fill(0);
      document.getElementById('timer-text').innerText = totalTime;
      document.getElementById('correct-text').innerText = "正解: 0/12";
      
      for(let i=1; i<=12; i++) document.getElementById(`lamp-${i}`).className = 'num-lamp';

      showQuestion();
      
      gameInterval = setInterval(() => {
        totalTime--;
        document.getElementById('timer-text').innerText = totalTime;

        // ★【修正】自動進行は5秒ごとの「時間切れペナルティ」の時だけ動かす
        if (totalTime % 5 === 0) {
          if (questionResults[currentQuestionIdx] === 0) {
            recordResult(false); // 時間切れ不正解
            goToNext();
          }
        }

        if (totalTime <= 0) endGame();
      }, 1000);
    }

    function showQuestion() {
      if (currentQuestionIdx >= 12) {
        endGame();
        return;
      }
      
      const currentQuiz = quizData[currentQuestionIdx];
      document.getElementById('quiz-question').innerText = currentQuiz.q;
      
      for (let i = 0; i < 4; i++) {
        document.getElementById(`btn${i}`).innerText = currentQuiz.c[i];
        document.getElementById(`btn${i}`).disabled = false;
      }

      const currentLamp = document.getElementById(`lamp-${currentQuestionIdx + 1}`);
      if (currentLamp) currentLamp.classList.add('current');
    }

    // ★【修正】回答ボタンを押した瞬間の処理
    function selectAnswer(choiceIdx) {
      for (let i = 0; i < 4; i++) document.getElementById(`btn${i}`).disabled = true;

      const isCorrect = (choiceIdx === quizData[currentQuestionIdx].a);
      if (isCorrect) correctCount++;
      
      recordResult(isCorrect);

      // ★最後の12問目を答えた瞬間に、大惨事確定なら「ボタンタップのイベント内」で即バイブを起動！
      if (currentQuestionIdx === 11 && correctCount <= 3) {
        triggerVibration();
      }

      // 5秒待たずに即座に次の問題へ移行！
      setTimeout(() => {
        goToNext();
      }, 200); // 0.2秒だけボタンを押した手応え（一瞬）を残して次へ
    }

    function recordResult(isCorrect) {
      questionResults[currentQuestionIdx] = isCorrect ? 1 : -1;
      document.getElementById('correct-text').innerText = `正解: ${correctCount}/12`;
      
      const currentLamp = document.getElementById(`lamp-${currentQuestionIdx + 1}`);
      if (currentLamp) {
        currentLamp.classList.remove('current');
        currentLamp.classList.add(isCorrect ? 'correct' : 'wrong');
      }
    }

    // ★次の問題に進む、またはゲーム終了へ渡す関数
    function goToNext() {
      currentQuestionIdx++;
      
      // まだ問題が残っていて、かつ全体の残り時間がある場合
      if (currentQuestionIdx < 12 && totalTime > 0) {
        // 次の問題の開始秒数（次の5の倍数）へタイマーをジャンプ同期させる
        totalTime = 60 - (currentQuestionIdx * 5);
        document.getElementById('timer-text').innerText = totalTime;
        showQuestion();
      } else {
        endGame();
      }
    }

    // 物理バイブレーションを強制起動する関数
    function triggerVibration() {
      if (navigator.vibrate) {
        // 激しく震えては止まる、大惨事パターン
        navigator.vibrate([800, 100, 800, 100, 800, 100, 800]);
      }
    }

    function endGame() {
      clearInterval(gameInterval);
      
      const container = document.getElementById('game-container');
      const resTitle = document.getElementById('result-title');
      const resDesc = document.getElementById('result-desc');

      if (correctCount <= 3) {
        resTitle.innerText = "💥 TIME SHOCK!!";
        resTitle.style.color = "#fff";
        resDesc.innerText = `正解数はわずか ${correctCount} 問！\n恐怖の回転ペナルティ発生！`;
        container.classList.add('time-shock-active');
        
        // 5秒ペナルティ自動判定でここに来た場合（ボタンタップを挟まなかった場合）の保険
        triggerVibration();
      } else if (correctCount === 12) {
        resTitle.innerText = "👑 PERFECT!!";
        resTitle.style.color = "#ffc107";
        resDesc.innerText = "お見事！12問全問正解！\nあなたは真のタイムショック王です！";
      } else {
        resTitle.innerText = "✨ CHALLENGE END";
        resTitle.style.color = "#4caf50";
        resDesc.innerText = `12問中、 ${correctCount} 問正解しました！`;
      }

      document.getElementById('result-overlay').classList.remove('hidden');
    }

    function hideResult() {
      document.getElementById('result-overlay').classList.add('hidden');
      document.getElementById('game-container').className = ''; 
      if (navigator.vibrate) navigator.vibrate(0); 
      startGame();
    }
  </script>
</body>
</html>
