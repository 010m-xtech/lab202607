<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lost in the Forest</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #e0e0e0;
            font-family: 'Hiragino Mincho ProN', 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        /* 画面全体のタップを検知するレイヤー */
        #tap-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 30; 
            display: none;
            cursor: pointer;
        }

        #game-container {
            position: relative;
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
            z-index: 25; /* テキストやボタンを最前面グループへ */
            pointer-events: none; 
        }

        /* ランタン（サイズは70%基準に可変制御） */
        #lantern {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: -1; 
            pointer-events: none;
            transition: all 1.2s ease;
            visibility: hidden;
        }

        #text-area {
            font-size: 1.15rem;
            line-height: 2.0;
            min-height: 180px;
            margin-bottom: 20px;
            letter-spacing: 0.12rem;
            text-shadow: 0 4px 8px rgba(0,0,0,1), 0 0 15px rgba(0,0,0,0.9);
            text-align: left;
            position: relative;
            z-index: 26; /* 血しぶきや暗転シートより絶対に前に出す */
        }

        .bottom-action-area {
            width: 100%;
            height: 120px; 
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 27; /* ボタンも最前面に */
        }

        /* タイトル画面用のスタートボタン配置（下から1/6付近） */
        .title-button-pos {
            position: fixed;
            bottom: 16.6%; 
            width: 70%; 
            max-width: 240px;
            z-index: 100;
        }

        .btn-container {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 35; 
        }

        button {
            background-color: rgba(15, 15, 15, 0.85);
            color: #ccc;
            border: 1px solid #555;
            padding: 0 20px;
            font-size: 1.1rem;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            flex: 1;
            height: 65px;
            align-self: center;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            pointer-events: auto; 
            letter-spacing: 0.15rem;
        }

        button:active {
            background-color: rgba(70, 10, 10, 0.9);
            color: #fff;
            border-color: #aa0000;
        }

        #tap-hint {
            position: absolute;
            font-size: 1.05rem;
            color: #aaa;
            letter-spacing: 0.1rem;
            text-shadow: 0 2px 4px rgba(0,0,0,1);
            animation: blink 1.5s infinite;
            display: none;
            z-index: 4;
        }

        /* 【修正】血しぶきレイヤーを暗転シート（z-index:6）の「前面」に配置！ */
        #blood-splatter {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(130,0,0,0.8) 0%, rgba(40,0,0,0.95) 70%, rgba(0,0,0,1) 100%);
            z-index: 15; /* 暗転シート(6)より上で、テキスト(26)より下 */
            opacity: 0;
            pointer-events: none;
            display: none;
        }

        /* 意識が遠のく漆黒のフェードアウト用レイヤー */
        #black-out {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 6; /* 背景(1)と血しぶき(15)の間に配置 */
            opacity: 0;
            pointer-events: none;
            display: none;
        }

        .splatter-animation { 
            display: block !important; 
            animation: blood-flash 0.6s forwards; 
        }

        @keyframes blood-flash { 
            0% { opacity: 0; transform: scale(1.3); } 
            100% { opacity: 1; transform: scale(1.0); } 
        }

        .fade-out-animation { 
            display: block !important; 
            animation: dark-fade 1.2s forwards; 
        }

        .fade-in-animation {
            display: block !important;
            animation: dark-fade 1.2s reverse forwards;
        }

        @keyframes dark-fade { 
            0% { opacity: 0; } 
            100% { opacity: 1; } 
        }

        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
        .panic-animation { animation: shake 0.4s both, flash-red 0.4s ease-out; }
        @keyframes shake { 10%, 90% { transform: translate3d(-3px, 0, 0); } 20%, 80% { transform: translate3d(5px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-7px, 0, 0); } }
        @keyframes flash-red { 0% { background-color: rgba(255, 0, 0, 0); } 50% { background-color: rgba(255, 0, 0, 0.2); } 100% { background-color: rgba(255, 0, 0, 0); } }
    </style>
</head>
<body>

<div id="tap-overlay" onclick="nextTrigger()"></div>
<div id="blood-splatter"></div>
<div id="black-out"></div>

<div id="game-container">
    <div id="lantern"></div>
    <div id="text-area"></div>
    <div class="bottom-action-area">
        <div class="btn-container" id="choices"></div>
        <div id="tap-hint">▼ 画面をタップして進む</div>
    </div>
</div>

<script>
    const IS_TEST_MODE = true; 

    let currentStep = 0;
    let totalSteps = 5;
    let mistakes = 0;
    let maxMistakes = 3;
    let correctPath = [];
    let nextAction = null;

    const textArea = document.getElementById('text-area');
    const choicesContainer = document.getElementById('choices');
    const lantern = document.getElementById('lantern');
    const tapOverlay = document.getElementById('tap-overlay');
    const tapHint = document.getElementById('tap-hint');
    const bloodSplatter = document.getElementById('blood-splatter');
    const blackOut = document.getElementById('black-out');

    function changeBackground(imgName, useTransition = true) {
        if (useTransition) {
            document.body.style.transition = "background-image 1.2s ease-in-out";
        } else {
            document.body.style.transition = "none";
        }
        document.body.style.backgroundImage = `url('${imgName}')`;
    }

    function enableScreenTap(actionFunction) {
        tapOverlay.style.display = 'block';
        tapHint.style.display = 'block';
        nextAction = actionFunction;
    }

    function disableScreenTap() {
        tapOverlay.style.display = 'none';
        tapHint.style.display = 'none';
        nextAction = null;
    }

    function nextTrigger() {
        if (nextAction) {
            const action = nextAction;
            disableScreenTap();
            action();
        }
    }

    // タイトル画面の表示
    function showTitleScreen() {
        blackOut.className = '';
        blackOut.style.display = 'none';
        bloodSplatter.className = '';
        bloodSplatter.style.display = 'none';
        
        changeBackground('top.webp', false); 
        lantern.style.visibility = 'hidden';
        textArea.innerHTML = '';
        choicesContainer.innerHTML = `
            <div class="title-button-pos">
                <button onclick="preStartGame()"> 森に入る </button>
            </div>
        `;
    }

    // スタート時の暗転
    function preStartGame() {
        choicesContainer.innerHTML = '';
        blackOut.className = ''; 
        blackOut.classList.add('fade-out-animation'); 
        
        setTimeout(() => {
            changeBackground('road1.webp', false); 
            lantern.style.visibility = 'hidden'; 
            
            blackOut.classList.replace('fade-out-animation', 'fade-in-animation');
            
            setTimeout(() => {
                blackOut.classList.remove('fade-in-animation');
                blackOut.style.display = 'none';
                
                startGame();
            }, 1200);
        }, 1200);
    }

    // ゲーム本編の開始
    function startGame() {
        currentStep = 0;
        mistakes = 0;
        correctPath = [];
        
        if (IS_TEST_MODE) {
            correctPath = [0, 0, 0, 0, 0];
        } else {
            for (let i = 0; i < totalSteps; i++) {
                correctPath.push(Math.floor(Math.random() * 2));
            }
        }

        bloodSplatter.className = '';
        bloodSplatter.style.display = 'none'; 
        
        updateLantern();
        showText("あたりは暗い森の中……<br>ほんのりと灯るランタンの明かりだけが、足元の道を照らしている。<br><br>あなたは歩き始めた。");
        
        // 【調整】表示時間を「3500ms（＋1秒）」に延長
        setTimeout(showFork, 3500);
    }

    // ランタンのサイズ制御（70%基準・3段階変化）
    function updateLantern(forceHide = false) {
        if (forceHide) {
            lantern.style.visibility = 'hidden';
            return;
        }
        lantern.style.visibility = 'visible';
        
        if (mistakes === 0) {
            lantern.style.background = "radial-gradient(circle, rgba(255,180,80,0.6) 0%, rgba(0,0,0,0) 80%)";
            lantern.style.width = "385px";
            lantern.style.height = "385px";
        } else if (mistakes === 1) {
            lantern.style.background = "radial-gradient(circle, rgba(245,130,30,0.5) 0%, rgba(0,0,0,0) 70%)";
            lantern.style.width = "325px";
            lantern.style.height = "325px";
        } else if (mistakes === 2) {
            lantern.style.background = "radial-gradient(circle, rgba(220,60,20,0.4) 0%, rgba(0,0,0,0) 65%)";
            lantern.style.width = "266px";
            lantern.style.height = "266px";
        }
    }

    function showText(text) {
        textArea.innerHTML = text;
    }

    function showFork() {
        changeBackground('road2.webp', true); 
        updateLantern();
        showText(`（サク、サク、サク……）<br><br>道が二手に分かれるV字路が現れた。`);
        choicesContainer.innerHTML = `
            <button onclick="choose(0)">左の道へ</button>
            <button onclick="choose(1)">右の道へ</button>
        `;
    }

    function choose(choice) {
        choicesContainer.innerHTML = '';
        disableScreenTap();
        if (choice === correctPath[currentStep]) {
            currentStep++;
            changeBackground('road1.webp', true);
            if (currentStep === totalSteps) {
                showText("（サク、サク、サク……）<br><br>最後の角を曲がり、一本道を進んでいく。すると……");
                setTimeout(showGoal, 3000);
            } else {
                showText("（サク、サク……）<br><br>正しい道を進んでいるようだ。<br>背後に不穏な気配は無い。");
                setTimeout(showFork, 2500);
            }
        } else {
            mistakes++;
            triggerPanicEffects();
            updateLantern();
            if (mistakes >= maxMistakes) {
                // 3回目のミス時点で即座にランタンを消去
                updateLantern(true); 
                
                // 血しぶき(前面)と暗転(背面)を同時に発動！
                bloodSplatter.className = '';
                blackOut.className = '';
                bloodSplatter.classList.add('splatter-animation');
                blackOut.classList.add('fade-out-animation');
                
                showText("（ザザッ！！！）<br><br>背後から凄まじい勢いで【何か】が迫り、あなたのランタンを吹き消した。<br><br>……ここで意識が途絶えた。");
                
                // 【調整】メッセージ固定時間を「6000ms（ー2秒）」に短縮
                setTimeout(() => {
                    showText(""); 
                    bloodSplatter.style.display = 'none';
                    blackOut.style.display = 'none';
                    showResetButton(); 
                }, 6000);
            } else {
                let warningText = mistakes === 1 ? 
                    "（……サク、サク……ザザッ）<br><br>道を曲がった瞬間、気のせいか、少し後ろから【別の足音】が聞こえた気がした。" :
                    "（ハァ……ハァ……）<br><br>間違いない。闇の中から、あなたの耳元に向けて冷たい呼吸音が近づいてきている。次はない。";
                showText(warningText);
                setTimeout(showFork, 3500);
            }
        }
    }

    function showGoal() {
        // 【修正】山小屋（road3）に切り替える「前」にランタンを消去！
        updateLantern(true); 
        
        // その後、山小屋に背景を切り替える
        changeBackground('road3.webp', true);
        showText("前方に、ぽつんと温かい明かりが見える。<br>山小屋だ！あなたは無事に森を抜け出した。");
        showResetButton();
    }

    function triggerPanicEffects() {
        if (navigator.vibrate) navigator.vibrate([150, 100, 150]);
        document.body.classList.add('panic-animation');
        setTimeout(() => document.body.classList.remove('panic-animation'), 400);
    }

    function showResetButton() {
        choicesContainer.innerHTML = `<button onclick="showTitleScreen()" style="width:100%; letter-spacing:0.1rem; padding: 0 15px;">もう一度、森へ入る</button>`;
    }

    window.onload = showTitleScreen;
</script>

</body>
</html>
