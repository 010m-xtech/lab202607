<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>間違い探し</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; touch-action: none; background: #000; font-family: sans-serif; }
    #game-container {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }
    #game-container canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1 !important;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }
    #ui-layer {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      color: white;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      pointer-events: none;
    }
    #start-overlay, #result-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      pointer-events: auto;
    }
    button {
      padding: 15px 40px;
      font-size: 24px;
      font-weight: bold;
      color: white;
      background: #ff4757;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      transition: transform 0.1s;
    }
    button:active {
      transform: scale(0.95);
    }
    h1 {
      color: white;
      margin-bottom: 30px;
      font-size: 32px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
      text-align: center;
      white-space: pre-wrap;
      line-height: 1.5;
    }
  </style>
  <script id="dc-ui-texts" type="application/json">
  {
    "sourceLang": "ja",
    "texts": {
      "ja": {
        "ui.start": "スタート",
        "ui.instruction": "間違いは3つあるよ！",
        "ui.sub_instruction": "（下の写真で間違いと思う部分をタッチしてね）",
        "hud.found": "みつけた！ {found} / {total}",
        "result.clear": "素晴らしい！全部見つけれたね！！",
        "result.timeup": "タイムアップ！残念、、、\n答え合わせはボタンをクリック！",
        "ui.retry": "もういちど",
        "ui.answer": "答え合わせ",
        "ui.touch_here": "下の写真の間違いと思う箇所をタッチしてね"
      },
      "en": {
        "ui.start": "Start",
        "ui.instruction": "There are 3 differences! Can you find them?",
        "ui.sub_instruction": "(Tap the differences on the bottom photo!)",
        "hud.found": "Found: {found} / {total}",
        "result.clear": "All Found!",
        "result.timeup": "Time's up!\n(Ask staff for the answers♪)",
        "ui.retry": "Retry",
        "ui.touch_here": "↓ Tap the bottom photo ↓"
      },
      "zh": {
        "ui.start": "开始",
        "ui.instruction": "有3处不同！快来找找看！",
        "ui.sub_instruction": "（请点击下方照片中的不同之处）",
        "hud.found": "找到: {found} / {total}",
        "result.clear": "全部找到！",
        "result.timeup": "时间到！\n（请向工作人员确认答案♪）",
        "ui.retry": "重试",
        "ui.touch_here": "↓ 请点击下方照片 ↓"
      },
      "ko": {
        "ui.start": "시작",
        "ui.instruction": "틀린 곳이 3군데 있어요! 찾아보세요!",
        "ui.sub_instruction": "(아래 사진에서 틀린 부분을 터치하세요)",
        "hud.found": "찾았다: {found} / {total}",
        "result.clear": "모두 찾음!",
        "result.timeup": "시간 종료!\n(정답은 직원에게 확인해 주세요♪)",
        "ui.retry": "다시하기",
        "ui.touch_here": "↓ 아래 사진을 터치하세요 ↓"
      },
      "es": {
        "ui.start": "Empezar",
        "ui.instruction": "¡Hay 3 diferencias! ¡Encuéntralas!",
        "ui.sub_instruction": "(¡Toca las diferencias en la foto de abajo!)",
        "hud.found": "Encontrado: {found} / {total}",
        "result.clear": "¡Todos encontrados!",
        "result.timeup": "¡Se acabó el tempo!\n(¡Pregunta al personal para las respuestas♪)",
        "ui.retry": "Reintentar",
        "ui.touch_here": "↓ Toca la foto de abajo ↓"
      },
      "pt": {
        "ui.start": "Começar",
        "ui.instruction": "Existem 3 diferenças! Encontre-as!",
        "ui.sub_instruction": "(Toque nas diferenças na foto de baixo!)",
        "hud.found": "Encontrado: {found} / {total}",
        "result.clear": "Todos Encontrados!",
        "result.timeup": "Tempo esgotado!\n(Pergunte à equipe pelas respostas♪)",
        "ui.retry": "Tentar novamente",
        "ui.answer": "Answer",
        "ui.touch_here": "↓ Toque na foto de baixo ↓"
      }
    }
  }
  </script>
</head>
<body>
  <div id="game-container">
    <div id="ui-layer">
    </div>
  </div>

  <div id="start-overlay">
    <p id="start-instruction" style="color: white; font-size: 28px; font-weight: bold; margin-bottom: 10px; text-align: center; text-shadow: 0 2px 10px rgba(0,0,0,0.5);"></p>
    <p id="start-sub-instruction" style="color: #ff4757; font-size: 24px; font-weight: bold; margin-bottom: 30px; text-align: center; text-shadow: 0 2px 10px rgba(0,0,0,0.8);"></p>
    <button id="start-btn" style="display:none;"></button>
  </div>

  <div id="result-overlay" style="display:none;">
    <h1 id="result-title"></h1>
    <button id="answer-btn" style="display:none; margin-top: 20px;"></button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.0/p5.min.js"></script>
  <script>
    // JSON構文エラーを防ぐために非改行スペースを通常のスペースに置換してクリーンアップ
    const rawJSONText = document.getElementById('dc-ui-texts').textContent;
    const cleanJSONText = rawJSONText.replace(/\u00A0/g, ' ');
    const uiPayload = JSON.parse(cleanJSONText);
    
    const sourceLang = uiPayload.sourceLang || 'en';
    const uiTexts = uiPayload.texts || {};
    const savedLang = (localStorage.getItem('dreamcore_lang') || '').slice(0, 2);
    const browserLang = (navigator.language || '').slice(0, 2);
    const currentLang = uiTexts[savedLang] ? savedLang : (uiTexts[browserLang] ? browserLang : sourceLang);
    
    function t(key, vars) {
      let s = (uiTexts[currentLang] && uiTexts[currentLang][key]) || (uiTexts[sourceLang] && uiTexts[sourceLang][key]) || key;
      if (vars) Object.keys(vars).forEach(k => { s = s.replaceAll('{' + k + '}', String(vars[k])); });
      return s;
    }

    class SynthAudio {
      constructor() { this.ctx = null; }
      init() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (this.ctx.state === 'suspended') this.ctx.resume();
      }
      play(freq, endFreq, duration, type = 'square', vol = 0.2) {
        this.init();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(endFreq, this.ctx.currentTime + duration);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
      }
      playTimeUp() {
        this.play(600, 400, 0.3, 'square', 0.2);
        setTimeout(() => this.play(600, 400, 0.8, 'square', 0.2), 400);
      }
      playCorrect() {
        this.play(800, 1200, 0.1, 'sine', 0.1);
        setTimeout(() => this.play(1200, 1600, 0.15, 'sine', 0.1), 100);
      }
      playClear() {
        this.play(500, 800, 0.2, 'sine', 0.2);
        setTimeout(() => this.play(600, 1000, 0.2, 'sine', 0.2), 200);
        setTimeout(() => this.play(800, 1200, 0.4, 'sine', 0.2), 400);
      }
    }
    const audio = new SynthAudio();
    document.addEventListener('pointerdown', () => audio.init(), { once: true });

    let gameState = 'WAITING';
    let img1 = null;
    let img2 = null;

    // 正解の座標データ (x: 横位置 0~1, y: 縦位置 0~1, r: 当たり判定の大きさ)
    // ※ダミーの座標を入れています。後で実際の間違い箇所に合わせて数値を調整してください。
    const differences = [
      { x: 0.783, y: 0.452, r: 0.06 },
      { x: 0.918, y: 0.639, r: 0.06 },
      { x: 0.740, y: 0.174, r: 0.06 }
    ];
    let foundDiffs = [false, false, false];

    // タイマー用変数
    const TIME_LIMIT = 45;
    let timeLeft = TIME_LIMIT;
    let timerStartTime = 0;

    const sketch = (p) => {
      p.preload = () => {
        // Postimagesの直接リンクを使用
        const img1Url = 'https://i.postimg.cc/BZCSDV3c/hua-xiang5.jpg';
        img1 = p.loadImage(img1Url, null, () => img1 = null);
        
        const img2Url = 'https://i.postimg.cc/4dJMTw0h/hua-xiang6.jpg';
        img2 = p.loadImage(img2Url, null, () => img2 = null);
      };

      p.setup = () => {
        const canvas = p.createCanvas(p.windowWidth, p.windowHeight);
        canvas.parent('game-container');
        p.imageMode(p.CENTER);

        // タッチやクリックの感度を良くするため、直接キャンバスにpointerdownイベントを設定
        canvas.elt.addEventListener('pointerdown', (e) => {
          if (gameState !== 'PLAYING') return;

          // キャンバス上の正確な座標を取得
          const rect = canvas.elt.getBoundingClientRect();
          const mx = e.clientX - rect.left;
          const my = e.clientY - rect.top;

          let box2 = { x: 0, y: p.windowHeight / 2, w: p.windowWidth, h: p.windowHeight / 2 };
          let bounds2 = calculateImageBounds(img2, box2.x, box2.y, box2.w, box2.h);
          
          if (!bounds2) return;

          // 下の画像内がタッチされたか
          if (mx >= bounds2.x && mx <= bounds2.x + bounds2.w &&
              my >= bounds2.y && my <= bounds2.y + bounds2.h) {
              
              // 正解の判定
              for (let i = 0; i < differences.length; i++) {
                if (foundDiffs[i]) continue; // すでに見つけている場合はスキップ
                let diff = differences[i];
                
                // 画面上のピクセル座標に変換して距離を測る
                let targetX = bounds2.x + diff.x * bounds2.w;
                let targetY = bounds2.y + diff.y * bounds2.h;
                let targetR = diff.r * Math.max(bounds2.w, bounds2.h);

                if (p.dist(mx, my, targetX, targetY) <= targetR) {
                  foundDiffs[i] = true;
                  updateUI();
                  audio.playCorrect(); // ピロン♪と鳴らす
                  checkClear(); // 全部見つけたかチェック
                  break; 
                }
              }
          }
        });

        document.getElementById('start-instruction').innerText = t('ui.instruction');
        document.getElementById('start-sub-instruction').innerText = t('ui.sub_instruction');
        document.getElementById('start-btn').innerText = t('ui.start');
        document.getElementById('start-btn').style.display = 'block';
        
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-overlay').style.display = 'none';
            gameState = 'PLAYING';
            timerStartTime = p.millis();
            timeLeft = TIME_LIMIT;
            foundDiffs = [false, false, false]; // 正解状況をリセット
            updateUI(); // 見つけた数のUIを更新
            audio.init();
        });

        // 答え合わせボタンを押した時の処理を追加
        document.getElementById('answer-btn').addEventListener('click', () => {
            document.getElementById('result-overlay').style.display = 'none';
            foundDiffs = [true, true, true]; // 全ての丸を表示状態にする
            gameState = 'ANSWER_VIEW'; // 答え合わせモード
            updateUI();
        });
      };

      function updateUI() {
        if (gameState === 'ANSWER_VIEW') {
          document.getElementById('ui-layer').innerText = t('ui.answer') || '答え合わせ';
        } else {
          let foundCount = foundDiffs.filter(f => f).length;
          document.getElementById('ui-layer').innerText = t('hud.found', { found: foundCount, total: differences.length });
        }
      }

      function checkClear() {
        let foundCount = foundDiffs.filter(f => f).length;
        if (foundCount === differences.length) {
          gameState = 'CLEAR';
          audio.playClear();
          setTimeout(() => {
            document.getElementById('result-title').innerText = t('result.clear');
            document.getElementById('answer-btn').style.display = 'none'; // クリア時は答え合わせボタンを隠す
            document.getElementById('result-overlay').style.display = 'flex';
          }, 1000);
        }
      }

      p.windowResized = () => {
        p.resizeCanvas(p.windowWidth, p.windowHeight);
      };

      // 画像の描画領域を計算する関数
      function calculateImageBounds(img, boxX, boxY, boxW, boxH) {
        if (!img) return null;
        const imgRatio = img.width / img.height;
        const boxRatio = boxW / boxH;
        let drawW, drawH;
        if (imgRatio > boxRatio) {
          drawW = boxW;
          drawH = boxW / imgRatio;
        } else {
          drawH = boxH;
          drawW = boxH * imgRatio;
        }
        const drawX = boxX + (boxW - drawW) / 2;
        const drawY = boxY + (boxH - drawH) / 2;
        return { x: drawX, y: drawY, w: drawW, h: drawH };
      }

      p.draw = () => {
        p.background(10);

        // PCなどの大画面でも、常に上下の2段に配置
        let box1 = { x: 0, y: 0, w: p.windowWidth, h: p.windowHeight / 2 };
        let box2 = { x: 0, y: p.windowHeight / 2, w: p.windowWidth, h: p.windowHeight / 2 };

        let bounds1 = calculateImageBounds(img1, box1.x, box1.y, box1.w, box1.h);
        let bounds2 = calculateImageBounds(img2, box2.x, box2.y, box2.w, box2.h);

        // 上画像の描画
        if (img1 && bounds1) {
          p.image(img1, bounds1.x + bounds1.w / 2, bounds1.y + bounds1.h / 2, bounds1.w, bounds1.h);
        } else {
          p.fill(50);
          p.rect(box1.x + 20, box1.y + 20, box1.w - 40, box1.h - 40);
        }

        // 下画像の描画
        if (img2 && bounds2) {
          p.image(img2, bounds2.x + bounds2.w / 2, bounds2.y + bounds2.h / 2, bounds2.w, bounds2.h);
        } else {
          p.fill(50);
          p.rect(box2.x + 20, box2.y + 20, box2.w - 40, box2.h - 40);
        }

        // 見つけた箇所に〇を描画する
        p.noFill();
        p.stroke(255, 50, 50); // 赤色
        p.strokeWeight(6);
        for (let i = 0; i < differences.length; i++) {
          if (foundDiffs[i]) {
            // 上の画像に〇
            if (bounds1) {
              let cx1 = bounds1.x + differences[i].x * bounds1.w;
              let cy1 = bounds1.y + differences[i].y * bounds1.h;
              let cr1 = differences[i].r * Math.max(bounds1.w, bounds1.h) * 2;
              p.circle(cx1, cy1, cr1);
            }
            // 下の画像に〇
            if (bounds2) {
              let cx2 = bounds2.x + differences[i].x * bounds2.w;
              let cy2 = bounds2.y + differences[i].y * bounds2.h;
              let cr2 = differences[i].r * Math.max(bounds2.w, bounds2.h) * 2;
              p.circle(cx2, cy2, cr2);
            }
          }
        }

        // 区切り線（常に水平な横線に固定）
        p.stroke(40);
        p.strokeWeight(4);
        p.line(0, p.windowHeight / 2, p.windowWidth, p.windowHeight / 2);

        // 誘導テキストの表示
        if (gameState === 'PLAYING') {
          p.push();
          p.translate(p.windowWidth / 2, p.windowHeight / 2 + 55);
          
          let msg = t('ui.touch_here') || '下の写真の間違いと思う箇所をタッチしてね';
          p.textSize(16);
          p.textStyle(p.BOLD);
          let tw = p.textWidth(msg);
          
          // 座布団（背景の黒帯）
          p.fill(0, 0, 0, 150);
          p.noStroke();
          p.rectMode(p.CENTER);
          p.rect(0, 0, tw + 40, 36, 18);

          // 点滅するテキスト（黄色）
          let alpha = 150 + 105 * Math.sin(p.millis() / 200);
          p.fill(255, 255, 0, alpha); 
          p.textAlign(p.CENTER, p.CENTER);
          p.text(msg, 0, 2);
          p.pop();
        }

        // タイマー処理と描画
        if (gameState === 'PLAYING') {
          let elapsed = (p.millis() - timerStartTime) / 1000;
          timeLeft = Math.max(0, TIME_LIMIT - elapsed);
          
          // 時間切れ処理
          if (timeLeft === 0) {
            gameState = 'TIMEUP';
            audio.playTimeUp();
            setTimeout(() => {
              document.getElementById('result-title').innerText = t('result.timeup');
              document.getElementById('answer-btn').innerText = t('ui.answer') || '答え合わせ';
              document.getElementById('answer-btn').style.display = 'block'; // 答え合わせボタンを表示
              document.getElementById('result-overlay').style.display = 'flex';
            }, 1000);
          }
        }

        // タイマーUI表示
        if (gameState !== 'WAITING') {
          p.push();
          // 画面全体の真ん中にタイマーを配置
          p.translate(p.windowWidth / 2, p.windowHeight / 2);
          p.fill(0, 0, 0, 180);
          p.noStroke();
          p.rectMode(p.CENTER);
          p.rect(0, 0, 100, 50, 25);

          p.fill(255);
          p.textSize(32);
          p.textAlign(p.CENTER, p.CENTER);
          p.textStyle(p.BOLD);
          
          // 残り10秒以下で赤く点滅
          if (timeLeft <= 10 && timeLeft > 0 && gameState === 'PLAYING') {
            if (Math.floor(p.millis() / 250) % 2 === 0) {
              p.fill(255, 71, 87);
            }
          }
          p.text(Math.ceil(timeLeft), 0, 2);
          p.pop();
        }
      };
    };

    new p5(sketch);
  </script>
</body>
</html>
