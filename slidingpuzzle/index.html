<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>スライドパズル</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a0f08;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #fff;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 5px;
      color: #ebdcb9;
    }

    p {
      font-size: 13px;
      margin-bottom: 15px;
      color: #ccc;
    }

    /* 難易度切り替えの帯 */
    .mode-select {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .mode-btn {
      padding: 6px 18px;
      border: 2px solid #82604a;
      background: #2b1d11;
      color: #ebdcb9;
      font-weight: bold;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
    }
    .mode-btn.active {
      background: #ebdcb9;
      color: #2b1d11;
      border-color: #ebdcb9;
    }

    /* パズルの外枠（360px固定） */
    #puzzle-container {
      position: relative;
      width: 360px;
      height: 360px;
      background: #2b1d11;
      border: 4px solid #82604a;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      display: grid;
      gap: 2px;
      padding: 2px;
    }

    /* 各ピース */
    .piece {
      width: 100%;
      height: 100%;
      background-size: 352px 352px;
      background-repeat: no-repeat;
      cursor: pointer;
      border-radius: 4px;
      transition: transform 0.1s ease;
      background-image: url('image.png'); 
    }
    .piece:active {
      transform: scale(0.95);
    }

    .empty {
      background: #2b1d11 !important;
      cursor: default;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }

    /* 下部コントロールエリア */
    .bottom-control {
      margin-top: 20px;
      width: 360px;
      display: flex;
      align-items: flex-end; /* ★下揃えにしてバランスを整える */
      justify-content: space-between;
      padding: 0 5px;
    }

    /* 左下のミニ完成図見本 */
    .sample-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .sample-image {
      width: 80px;
      height: 80px;
      border: 2px solid #82604a;
      border-radius: 4px;
      background-size: cover;
      background-position: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
    .sample-box span {
      font-size: 11px;
      color: #ebdcb9;
      font-weight: bold;
    }

    /* ★タイマー表示のスタイル（混ぜなおすボタンの横・見本の右に配置変更） */
    #timer-display {
      font-size: 18px;
      font-weight: bold;
      color: #ffc107;
      font-family: monospace;
      background: rgba(0,0,0,0.4);
      padding: 8px 15px;
      border-radius: 10px;
      border: 1px solid #82604a;
      margin-bottom: 5px; /* ボタンと高さを合わせる微調整 */
    }

    /* シャッフルボタン */
    #shuffle-btn {
      padding: 12px 25px;
      border: none;
      border-radius: 50px;
      background: #b81c22;
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      height: 45px;
      margin-bottom: 5px;
    }
    #shuffle-btn:active {
      transform: scale(0.95);
    }

    /* クリア画面 */
    #clear-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      border-radius: 4px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #clear-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .clear-panel {
      background: #fffdf7;
      color: #333;
      padding: 25px 40px;
      border-radius: 16px;
      text-align: center;
      border: 3px solid #34c759;
    }
    .clear-panel h2 { color: #34c759; margin-bottom: 10px; }
    .clear-panel button {
      padding: 10px 25px;
      border: none;
      border-radius: 20px;
      background: #34c759;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <h1>スライドパズル</h1>
  <p>隣り合うピースをタップして絵を完成させよう！</p>

  <div class="mode-select">
    <button id="btn-easy" class="mode-btn active" onclick="changeMode(3)">初級 (3×3)</button>
    <button id="btn-hard" class="mode-btn" onclick="changeMode(4)">上級 (4×4)</button>
  </div>

  <div style="position: relative;">
    <div id="puzzle-container"></div>
    
    <div id="clear-overlay">
      <div class="clear-panel">
        <h2>クリア！</h2>
        <p>やったね！綺麗に完成したよ！</p>
        <p id="clear-time-text" style="color: #333; font-weight: bold; font-size: 16px; margin-top: 5px;"></p>
        <button id="retry-btn">もう一度遊ぶ</button>
      </div>
    </div>
  </div>

  <div class="bottom-control">
    <div class="sample-box">
      <div id="sample-img-view" class="sample-image"></div>
      <span>完成図</span>
    </div>
    
    <div id="timer-display">⏱ 00:00</div>
    
    <button id="shuffle-btn">混ぜなおす</button>
  </div>

  <script>
    let gridSize = 3; 
    let board = [];
    
    let startTime = 0;
    let timerInterval = null;
    let elapsedTime = 0;

    const container = document.getElementById('puzzle-container');
    const overlay = document.getElementById('clear-overlay');

    function startTimer() {
      clearInterval(timerInterval); 
      startTime = Date.now();
      timerInterval = setInterval(updateTimer, 1000); 
    }

    function stopTimer() {
      clearInterval(timerInterval);
    }

    function updateTimer() {
      elapsedTime = Math.floor((Date.now() - startTime) / 1000);
      const minutes = Math.floor(elapsedTime / 60).toString().padStart(2, '0');
      const seconds = (elapsedTime % 60).toString().padStart(2, '0');
      document.getElementById('timer-display').innerText = `⏱ ${minutes}:${seconds}`;
    }

    function initPuzzle() {
      overlay.classList.remove('show');
      syncSampleImage();
      
      container.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
      container.style.gridTemplateRows = `repeat(${gridSize}, 1fr)`;
      
      const totalPieces = gridSize * gridSize;
      board = [];
      for(let i = 0; i < totalPieces; i++) {
        board.push(i);
      }
      
      shuffleBoard();
    }

    function syncSampleImage() {
      const dummy = document.createElement('div');
      dummy.className = 'piece';
      document.body.appendChild(dummy);
      const bgImg = window.getComputedStyle(dummy).backgroundImage;
      document.body.removeChild(dummy);
      document.getElementById('sample-img-view').style.backgroundImage = bgImg;
    }

    function changeMode(size) {
      gridSize = size;
      document.getElementById('btn-easy').classList.toggle('active', size === 3);
      document.getElementById('btn-hard').classList.toggle('active', size === 4);
      initPuzzle();
    }

    function renderBoard() {
      container.innerHTML = '';
      const totalPieces = gridSize * gridSize;
      const emptyValue = totalPieces - 1; 
      const piecePixelSize = 352 / gridSize; 
      
      board.forEach((pieceValue, currentPos) => {
        const cell = document.createElement('div');
        
        if (pieceValue === emptyValue) {
          cell.className = 'piece empty';
        } else {
          cell.className = 'piece';
          
          const correctRow = Math.floor(pieceValue / gridSize);
          const correctCol = pieceValue % gridSize;
          const bgX = -correctCol * piecePixelSize;
          const bgY = -correctRow * piecePixelSize;
          
          cell.style.backgroundPosition = `${bgX}px ${bgY}px`;
          cell.onclick = () => movePiece(currentPos);
        }
        
        container.appendChild(cell);
      });
    }

    function movePiece(currentPos) {
      const totalPieces = gridSize * gridSize;
      const emptyValue = totalPieces - 1;
      const emptyPos = board.indexOf(emptyValue);
      
      const isNeighbor = 
        (Math.abs(currentPos - emptyPos) === 1 && Math.floor(currentPos / gridSize) === Math.floor(emptyPos / gridSize)) || 
        (Math.abs(currentPos - emptyPos) === gridSize);
      
      if (isNeighbor) {
        board[emptyPos] = board[currentPos];
        board[currentPos] = emptyValue;
        
        renderBoard();
        checkWin();
      }
    }

    function shuffleBoard() {
      overlay.classList.remove('show');
      const totalPieces = gridSize * gridSize;
      const emptyValue = totalPieces - 1;
      
      board = [];
      for(let i = 0; i < totalPieces; i++) board.push(i);
      
      const shuffleCount = gridSize === 3 ? 100 : 200;
      
      for (let i = 0; i < shuffleCount; i++) {
        const emptyPos = board.indexOf(emptyValue);
        const validMoves = [];
        
        if (emptyPos % gridSize > 0) validMoves.push(emptyPos - 1); 
        if (emptyPos % gridSize < gridSize - 1) validMoves.push(emptyPos + 1); 
        if (emptyPos >= gridSize) validMoves.push(emptyPos - gridSize); 
        if (emptyPos < gridSize * (gridSize - 1)) validMoves.push(emptyPos + gridSize); 
        
        const randomMove = validMoves[Math.floor(Math.random() * validMoves.length)];
        board[emptyPos] = board[randomMove];
        board[randomMove] = emptyValue;
      }
      renderBoard();
      
      startTimer();
    }

    function checkWin() {
      const isWin = board.every((val, idx) => val === idx);
      if (isWin) {
        stopTimer();
        
        setTimeout(() => {
          const finalTimeText = document.getElementById('timer-display').innerText;
          document.getElementById('clear-time-text').innerText = `クリアタイム: ${finalTimeText.replace('⏱ ', '')}`;
          
          overlay.classList.add('show');
        }, 200);
      }
    }

    document.getElementById('shuffle-btn').onclick = shuffleBoard;
    document.getElementById('retry-btn').onclick = initPuzzle;

    initPuzzle();
  </script>
</body>
</html>
