<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ロスト・イン・ザ・フォーク</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #e0e0e0;
            font-family: 'Hiragino Mincho ProN', 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.8s ease-in-out;
            position: relative;
        }

        /* 画面全体をタップ可能にするための透明なレイヤー */
        #tap-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            display: none; /* 必要な時だけ表示 */
            cursor: pointer;
        }

        #game-container {
            position: relative;
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
            z-index: 2;
        }

        #lantern {
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, rgba(255,170,50,0.6) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            margin: 0 auto 40px auto;
            box-shadow: 0 0 25px rgba(255,170,50,0.3);
            transition: all 1s ease;
        }

        #text-area {
            font-size: 1.15rem;
            line-height: 1.9;
            min-height: 150px;
            margin-bottom: 40px;
            letter-spacing: 0.12rem;
            text-shadow: 0 2px 5px rgba(0,0,0,1), 0 0 10px rgba(0,0,0,0.8);
            text-align: left;
        }

        .btn-container {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            position: relative;
            z-index: 10; /* タップレイヤーより前に出す */
        }

        button {
            background-color: rgba(15, 15, 15, 0.75);
            color: #ccc;
            border: 1px solid #444;
            padding: 18px 20px;
            font-size: 1.05rem;
            font-family: inherit;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            flex: 1;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
        }

        button:active {
            background-color: rgba(50, 10, 10, 0.8);
            color: #fff;
        }

        /* 画面下の小さなタップ促しテキスト */
        #tap-hint {
            font-size: 0.85rem;
            color: #888;
            margin-top: 10px;
            animation: blink 1.5s infinite;
            display: none;
        }

        @keyframes blink {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* ミス時の演出 */
        .panic-animation {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both, flash-red 0.4s ease-out;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-3px, 0, 0); }
            20%, 80% { transform: translate3d(5px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-7px, 0, 0); }
            40%, 60% { transform: translate3d(7px, 0, 0); }
        }

        @keyframes flash-red {
            0% { background-color: rgba(255, 0, 0, 0); }
            50% { background-color: rgba(255, 0, 0, 0.2); }
            100% { background-color: rgba(255, 0, 0, 0); }
        }
    </style>
</head>
<body>

<div id="tap-overlay" onclick="nextTrigger()"></div>

<div id="game-container">
    <div id="lantern"></div>
    <div id="text-area"></div>
    <div class="btn-container" id="choices"></div>
    <div id="tap-hint">▼ 画面をタップして進む</div>
</div>

<script>
    let currentStep = 0;
    let totalSteps = 5;
    let mistakes = 0;
    let maxMistakes = 3;
    let correctPath = [];
    let nextAction = null; // 次にタップした時に実行する関数を保存する変数

    const textArea = document.getElementById('text-area');
    const choicesContainer = document.getElementById('choices');
    const lantern = document.getElementById('lantern');
    const tapOverlay = document.getElementById('tap-overlay');
    const tapHint = document.getElementById('tap-hint');

    function changeBackground(imgName) {
        document.body.style.backgroundImage = `url('${imgName}')`;
    }

    // 画面タップを許可する
    function enableScreenTap(actionFunction) {
        tapOverlay.style.display = 'block';
        tapHint.style.display = 'block';
        nextAction = actionFunction;
    }

    // 画面タップを禁止する（ボタン選択の時など）
    function disableScreenTap() {
        tapOverlay.style.display = 'none';
        tapHint.style.display = 'none';
        nextAction = null;
    }

    // 画面がタップされたら実行
    function nextTrigger() {
        if (nextAction) {
            const action = nextAction;
            disableScreenTap();
            action();
        }
    }

    // ゲームの初期化
    function initGame() {
        currentStep = 0;
        mistakes = 0;
        correctPath = [];
        
        // 5回分の正解ルートをランダム生成 (0: 左, 1: 右)
        for (let i = 0; i < totalSteps; i++) {
            correctPath.push(Math.floor(Math.random() * 2));
        }

        updateLantern();
        choicesContainer.innerHTML = '';
        
        // 【演出】最初は road1.webp（一本道）を表示
        changeBackground('road1.webp');
        showText("あたりは暗い森の中……<br>ほんのりと灯るランタンの明かりだけが、足元の道を照らしている。<br><br>あなたは歩き始めた。");
        
        // タップしたらV字路（road2）へ進むように設定
        enableScreenTap(showFork);
    }

    function updateLantern() {
        if (mistakes === 0) {
            lantern.style.background = "radial-gradient(circle, rgba(255,170,50,0.6) 0%, rgba(0,0,0,0) 70%)";
            lantern.style.boxShadow = "0 0 25px rgba(255,170,50,0.3)";
        } else if (mistakes === 1) {
            lantern.style.background = "radial-gradient(circle, rgba(240,120,40,0.4) 0%, rgba(0,0,0,0) 65%)";
            lantern.style.boxShadow = "0 0 15px rgba(240,120,40,0.15)";
        } else if (mistakes === 2) {
            lantern.style.background = "radial-gradient(circle, rgba(255,40,40,0.2) 0%, rgba(0,0,0,0) 55%)";
            lantern.style.boxShadow = "0 0 10px rgba(255,40,40,0.1)";
        } else {
            lantern.style.background = "none";
            lantern.style.boxShadow = "none";
        }
    }

    function showText(text) {
        textArea.innerHTML = text;
    }

    // V字路の提示
    function showFork() {
        // ここで road2.webp（分かれ道）に切り替える
        changeBackground('road2.webp');
        showText(`（サク、サク、サク……）<br><br>道が二手に分かれるV字路が現れた。<br>【第 ${currentStep + 1} の分岐点】`);
        
        // 選択ボタンを表示（この間はタップで進めない）
        choicesContainer.innerHTML = `
            <button onclick="choose(0)">左の道へ</button>
            <button onclick="choose(1)">右の道へ</button>
        `;
    }

    // 選択肢を選んだ時の処理
    function choose(choice) {
        choicesContainer.innerHTML = ''; // ボタンを消す
        
        if (choice === correctPath[currentStep]) {
            // 正解の場合
            currentStep++;
            
            // road1.webp（一本道）に戻す
            changeBackground('road1.webp');
            
            if (currentStep === totalSteps) {
                showText("（サク、サク、サク……）<br><br>最後の角を曲がり、一本道を進んでいく。すると……");
                enableScreenTap(showGoal);
            } else {
                showText("（サク、サク……）<br><br>正しい道を進んでいるようだ。<br>背後に不穏な気配は無い。");
                enableScreenTap(showFork); // タップしたら次のV字路へ
            }
        } else {
            // 不正解の場合
            mistakes++;
            triggerPanicEffects();
            updateLantern();
            
            if (mistakes >= maxMistakes) {
                showText("（ザザッ！！！）<br><br>背後から凄まじい勢いで【何か】が迫り、あなたのランタンを吹き消した。<br><br>……ここで意識が途絶えた。");
                enableScreenTap(showResetButton);
            } else {
                let warningText = "";
                if (mistakes === 1) {
                    warningText = "（……サク、サク……ザザッ）<br><br>道を曲がった瞬間、気のせいか、少し後ろから【別の足音】が聞こえた気がした。";
                } else if (mistakes === 2) {
                    warningText = "（ハァ……ハァ……）<br><br>間違いない。闇の中から、あなたの耳元に向けて冷たい呼吸音が近づいてきている。次はない。";
                }
                showText(warningText);
                // ミスした時も、タップしたら次のV字路（road2）を出し直す
                enableScreenTap(showFork);
            }
        }
    }

    // ゴール表示
    function showGoal() {
        changeBackground('road3.webp'); // 山小屋を表示
        showText("前方に、ぽつんと温かい明かりが見える。<br>山小屋だ！あなたは無事に森を抜け出した。");
        enableScreenTap(showResetButton);
    }

    function triggerPanicEffects() {
        if (navigator.vibrate) {
            navigator.vibrate([150, 100, 150]);
        }
        document.body.classList.add('panic-animation');
        setTimeout(() => {
            document.body.classList.remove('panic-animation');
        }, 400);
    }

    function showResetButton() {
        choicesContainer.innerHTML = `<button onclick="initGame()">もう一度、森へ入る</button>`;
    }

    window.onload = initGame;
</script>

</body>
</html>
