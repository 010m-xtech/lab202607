<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LIFT THE TRUCK! - AR Camera</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }

    /* 1. スタート画面 */
    #start-overlay {
      position: fixed; 
      inset: 0; 
      background: url('background.png') no-repeat center center;
      background-size: cover; 
      z-index: 100;
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      padding-bottom: 100px;   
    }
    .start-btn {
      padding: 20px 40px; background: #ffc107; color: #333; font-size: 1.3em;
      font-weight: bold; border: none; border-radius: 50px; cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    /* カメラ映像のコンテナ */
    #camera-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: cover; }

    /* カメラ切り替えボタン（画面右上） */
    #switch-btn {
      position: absolute;
      top: 25px;
      right: 25px;
      width: 50px;
      height: 50px;
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      color: white;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 30;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    #switch-btn:active { transform: scale(0.9); }

    /* 動かせるトラック画像 */
    #track-frame {
      position: absolute;
      width: 220px; 
      top: 50%; left: 50%; 
      transform: translate(-50%, -50%) scale(1) rotate(0deg); 
      touch-action: none;
      cursor: move;
      user-select: none;
      z-index: 10;
      display: none; 
    }

    /* トラックのアニメーション演出 */
    .truck-entrance-animation {
      display: block !important;
      pointer-events: none; 
      animation: truckDriveBy 4.0s linear forwards; 
    }

    @keyframes truckDriveBy {
      0% { left: 150%; opacity: 1; transform: translate(-50%, -50%) scale(1.2) rotate(0deg); }
      30% { left: -50%; opacity: 1; transform: translate(-50%, -50%) scale(1.2) rotate(0deg); }
      31% { left: -50%; opacity: 0; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
      35% { left: 150%; opacity: 0; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
      45% { left: 150%; opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
      100% { left: 50%; opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    }

    /* 触ると消える案内メッセージ */
    #guide-message {
      position: absolute;
      top: 20%; left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      padding: 15px 20px;
      border-radius: 15px;
      font-size: 13px;
      line-height: 1.5;
      width: 85%;
      max-width: 320px;
      text-align: center;
      z-index: 20;
      pointer-events: none; 
      opacity: 0; 
      transition: opacity 0.5s ease;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* カメラ画面の右下のロゴ */
    #camera-logo-overlay {
      position: absolute;
      bottom: 3%;
      right: 3%;
      width: 30%;        
      max-width: 200px;  
      z-index: 12;
      pointer-events: none;
      opacity: 0.8;
    }

    /* シャッターボタンエリア */
    .controls {
      position: absolute; bottom: 30px; left: 0; width: 100%;
      display: flex; justify-content: center; align-items: center; z-index: 15;
    }
    .shutter-btn {
      width: 75px; height: 75px; background: white; border: 5px solid #ccc;
      border-radius: 50%; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    /* 撮影後のプレビュー画面 */
    #photo-preview-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 50;
      display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
    }
    #captured-image { max-width: 100%; max-height: 70%; border-radius: 10px; box-shadow: 0 4px 20px rgba(255,255,255,0.2); }
    .preview-btns { margin-top: 20px; display: flex; gap: 20px; }
    .sub-btn { padding: 12px 25px; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 1em; }
    .retake { background: #555; color: white; }
    .save-msg { color: #aaa; font-size: 12px; margin-top: 15px; text-align: center; line-height: 1.4; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="start-overlay">
    <button class="start-btn" onclick="startCamera()">LET'S PHOTO!</button>
  </div>

  <div id="camera-container" ontouchstart="dismissGuide()">
    <video id="video" autoplay playsinline></video>
    
    <button id="switch-btn" onclick="switchCamera()">🔄</button>
    
    <div id="guide-message">
      🚚 トラックを移動、拡大・縮小！<br>指2本をひねると斜めに傾けられるよ！<br>いろんなポーズで写真を撮ってシェアしよう！
    </div>
    
    <img id="track-frame" src="image.png" alt="トラック">
    <img id="camera-logo-overlay" src="rogo.png" alt="ロゴ">

    <div class="controls">
      <button class="shutter-btn" onclick="takePhoto()"></button>
    </div>
  </div>

  <div id="photo-preview-overlay" class="hidden">
    <h3 style="color: white; margin-bottom: 15px;">いい写真が撮れたかな？</h3>
    <img id="captured-image" src="" alt="撮影された写真">
    <div class="preview-btns">
      <button class="sub-btn retake" onclick="retakePhoto()">もう一度撮る</button>
    </div>
    <p class="save-msg">※上の写真を長押ししてスマホに保存してね！</p>
  </div>

  <canvas id="canvas" class="hidden"></canvas>

  <script>
    const video = document.getElementById('video');
    const track = document.getElementById('track-frame');
    const guide = document.getElementById('guide-message');
    const logoImg = document.getElementById('camera-logo-overlay');
    
    let currentScale = 1;
    let currentRotation = 0; 
    let startDist = 0;
    let startAngle = 0;      
    let posX = 0, posY = 0; 
    let startX = 0, startY = 0;
    let isAnimationFinished = false; 
    
    let currentFacingMode = "environment";
    let currentStream = null;

    // カメラ起動処理
    async function startCamera() {
      if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { 
            facingMode: currentFacingMode, 
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }, 
          audio: false
        });
        currentStream = stream;
        video.srcObject = stream;
        
        const startOverlay = document.getElementById('start-overlay');
        if (!startOverlay.classList.contains('hidden')) {
          startOverlay.classList.add('hidden');
          track.classList.add('truck-entrance-animation');
          
          setTimeout(() => {
            isAnimationFinished = true;
            track.classList.remove('truck-entrance-animation'); 
            track.style.display = 'block'; 
            track.style.pointerEvents = 'auto'; 
            if (guide) guide.style.opacity = '1';
          }, 4000);
        }

      } catch (err) {
        alert("カメラの起動に失敗しました。ブラウザの設定でカメラのアクセス権限を許可してください。");
        console.error(err);
      }
    }

    // カメラ切り替え
    async function switchCamera() {
      currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
      await startCamera();
    }

    function dismissGuide() {
      if (guide && !guide.classList.contains('hidden')) {
        guide.style.opacity = '0'; 
        setTimeout(() => {
          guide.classList.add('hidden'); 
        }, 500);
      }
    }

    // トラック操作
    function getDistance(touches) {
      return Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
    }

    function getAngle(touches) {
      const dy = touches[0].clientY - touches[1].clientY;
      const dx = touches[0].clientX - touches[1].clientX;
      return Math.atan2(dy, dx) * 180 / Math.PI;
    }

    track.addEventListener('touchstart', (e) => {
      if (!isAnimationFinished) return; 
      dismissGuide(); 
      if (e.touches.length === 1) {
        startX = e.touches[0].clientX - posX;
        startY = e.touches[0].clientY - posY;
      } else if (e.touches.length === 2) {
        startDist = getDistance(e.touches);
        startAngle = getAngle(e.touches) - currentRotation; 
      }
    });

    track.addEventListener('touchmove', (e) => {
      if (!isAnimationFinished) return; 
      e.preventDefault(); 

      if (e.touches.length === 1) {
        posX = e.touches[0].clientX - startX;
        posY = e.touches[0].clientY - startY;
      } else if (e.touches.length === 2) {
        const dist = getDistance(e.touches);
        const scaleFactor = dist / startDist;
        currentScale = Math.min(Math.max(currentScale * scaleFactor, 0.2), 4.0); 
        startDist = dist;

        currentRotation = getAngle(e.touches) - startAngle;
      }
      updateTransform();
    });

    function updateTransform() {
      track.style.transform = `translate(-50%, -50%) translate(${posX}px, ${posY}px) scale(${currentScale}) rotate(${currentRotation}deg)`;
    }

    // ──────────────────────────────────────────────────────────
    // ★ 【バグ撃破】写真撮影 ＆ 拡大化バグ防止合成処理
    // ──────────────────────────────────────────────────────────
    function takePhoto() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      // 1. 背景（カメラ映像）を描画
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      // 2. 画面上の見え方と実際の解像度の比率を逆算
      const videoRect = video.getBoundingClientRect();
      const canvasRatio = canvas.width / canvas.height;
      const screenRatio = videoRect.width / videoRect.height;
      
      let scale, xOffset = 0, yOffset = 0;
      
      if (canvasRatio > screenRatio) {
        scale = canvas.width / videoRect.width;
        yOffset = (canvas.height - videoRect.height * scale) / 2;
      } else {
        scale = canvas.height / videoRect.height;
        xOffset = (canvas.width - videoRect.width * scale) / 2;
      }

      // ★トラックの画面上での正確な大きさと中心点を計算
      const trackRect = track.getBoundingClientRect();
      const centerX = (trackRect.left - videoRect.left + trackRect.width / 2) * scale + xOffset;
      const centerY = (trackRect.top - videoRect.top + trackRect.height / 2) * scale + yOffset;

      // ★拡大化バグを完全に防ぐ、厳密なスタンプサイズ計算
      const drawWidth = track.offsetWidth * currentScale * scale;
      const drawHeight = track.offsetHeight * currentScale * scale;

      // キャンバスを回転させてトラックを描画
      ctx.save(); 
      ctx.translate(centerX, centerY); 
      ctx.rotate(currentRotation * Math.PI / 180); 
      ctx.drawImage(track, -drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);
      ctx.restore(); 

      // 3. ロゴの描画
      const logoRect = logoImg.getBoundingClientRect();
      const logoDrawX = (logoRect.left - videoRect.left) * scale + xOffset;
      const logoDrawY = (logoRect.top - videoRect.top) * scale + yOffset;
      const logoDrawWidth = logoRect.width * scale;
      const logoDrawHeight = logoRect.height * scale;

      ctx.drawImage(logoImg, logoDrawX, logoDrawY, logoDrawWidth, logoDrawHeight);

      // 4. プレビュー画面の表示
      const dataUrl = canvas.toDataURL('image/png');
      document.getElementById('captured-image').src = dataUrl;
      document.getElementById('photo-preview-overlay').classList.remove('hidden');
    }

    function retakePhoto() {
      document.getElementById('photo-preview-overlay').classList.add('hidden');
    }
  </script>
</body>
</html>
