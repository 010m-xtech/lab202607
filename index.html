<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ゲームアンケート202607アプリ</title>
    <style>
        body { font-family: sans-serif; background: #fff8e1; text-align: center; padding: 20px; color: #333; }
        .container { background: white; padding: 20px; border-radius: 15px; max-width: 450px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        .q-title { font-weight: bold; margin-top: 20px; display: block; text-align: left; }
        label { display: block; text-align: left; margin: 8px 0; cursor: pointer; }
        textarea, select, input[type="number"] { width: 100%; box-sizing: border-box; padding: 10px; margin-top: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 1em; background-color: #fff; }
        textarea { height: 60px; }
        
        select:invalid { color: #777; }
        select option { color: #333; }
        select option[value=""] { color: #777; }

        .submit-trigger-btn { width: 100%; padding: 15px; margin-top: 30px; background: #ffc107; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 1.1em; color: #333; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
        .submit-trigger-btn:hover { background: #ffb300; }
        
        .game-link-btn { display: block; width: 100%; box-sizing: border-box; text-decoration: none; padding: 15px; margin-top: 15px; background: #ff9800; color: white; border-radius: 30px; font-weight: bold; font-size: 1.1em; text-align: center; transition: background 0.2s; border: none; cursor: pointer; font-family: sans-serif; }
        .game-link-btn:hover { background: #e65100; }

        .notice-text { font-size: 10px; color: #777; text-align: left; margin-top: 30px; line-height: 1.4; border-top: 1px dashed #ddd; padding-top: 10px; }
        .loading-text { font-size: 1.1em; font-weight: bold; color: #ff9800; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="survey-fields-container">
        <h2>ゲームのニーズ調査に<br>ご協力お願いします</h2>

        <span class="q-title">1. あなたの性別を教えてください</span>
        <select id="gender" required>
            <option value="" disabled selected hidden>性別を選択してください</option>
            <option value="男性">男性</option>
            <option value="女性">女性</option>
        </select>

        <span class="q-title">2. あなたの年代を教えてください</span>
        <select id="age" required>
            <option value="" disabled selected hidden>年代を選択してください</option>
            <option value="20代">20代</option>
            <option value="30代">30代</option>
            <option value="40代">40代</option>
            <option value="50代">50代</option>
            <option value="60代">60代</option>
        </select>

        <span class="q-title">3. 今一緒に食事をしている人数を教えてください</span>
        <select id="guests" required>
            <option value="" disabled selected hidden>人数を選択してください</option>
            <option value="1人">1人</option>
            <option value="2人">2人</option>
            <option value="3人以上">3人以上</option>
        </select>

        <span class="q-title">お気に入りのゲームを教えてください</span>
        <textarea id="comment" placeholder="お気に入りのゲームを教えてください" required></textarea>
        
        <button type="button" id="survey-submit-btn" class="submit-trigger-btn" onclick="submitSurveyAndShowGames()">アンケートに回答してゲームに挑戦</button>
    </div>

    <div id="loading-container" class="hidden">
        <p class="loading-text">アンケートを送信しています...</p>
    </div>

    <div id="game-list-container" class="hidden">
        <h2>ご協力ありがとうございました！<br>好きなゲームを選んでね</h2>
        <button class="game-link-btn" style="background: #00aa6e;" onclick="clickGameLog('まちがい探し', 'https://010m-xtech.github.io/minigame/aishouranai/')">まちがい探し どこが違うか見つけられるかな</button>
        <button class="game-link-btn" onclick="clickGameLog('MMガチャ', 'https://010m-xtech.github.io/minigame/aishouranai/')">MMガチャ 何が出るかな</button>
        <button class="game-link-btn" style="background: #e73c84;" onclick="clickGameLog('MMパズル', 'https://010m-xtech.github.io/lab202607/slidingpuzzle/')">MMパズル 何秒でクリアできる？</button>
        <button class="game-link-btn" style="background: #00aa6e;" onclick="clickGameLog('AR撮影', 'https://010m-xtech.github.io/minigame/aishouranai/')">AR撮影 トラックを持ち上げろ</button>
        <button class="game-link-btn" style="background: #00aa6e;" onclick="clickGameLog('あいしょう占い', 'https://010m-xtech.github.io/minigame/aishouranai/')">あいしょう占い あの人との相性は何％?!</button>            
    </div>

    <div class="notice-text">
        ※当システムではローカルストレージを使用しこのアプリ専用の識別番号を発行しています。個人を特定する情報は一切取得いたしません。
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxu3L57d4yrM1Slz9IhxXfLfCrnMw-vc1f3I_KVc19527c6cxiGczUusYz8crvhR8jy/exec"; // ★必ず【新しいデプロイ】で発行した最新のURLを貼ってください！

    let deviceId = ""; 

    // ログ送信用
    async function sendStepLog(stepName) {
        try {
            await fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ type: "log", step: stepName, deviceId: deviceId })
            });
        } catch (e) { console.error(e); }
    }

    // アクセス時
    window.onload = () => {
        let savedId = localStorage.getItem('beer_app_device_id');
        if (!savedId) {
            savedId = 'dev_' + Date.now() + '_' + Math.random().toString(36).substring(2, 11);
            localStorage.setItem('beer_app_device_id', savedId);
        }
        deviceId = savedId; 

        sendStepLog("①URLアクセス");
    };

    // 【変更】アンケートボタンが押されたら送信して、入力欄を隠す関数
    async function submitSurveyAndShowGames() {
        const gender = document.getElementById('gender').value;
        const age = document.getElementById('age').value;
        const guests = document.getElementById('guests').value;
        const comment = document.getElementById('comment').value.trim();

        // 必須入力チェック
        if (!gender || !age || !guests || !comment) {
            alert("未入力の項目があります。すべてのアンケートにお答えください。");
            return;
        }

        // 2重クリック防止のためにボタンを無効化し、ローディング表示
        document.getElementById('survey-submit-btn').disabled = true;
        document.getElementById('loading-container').classList.remove('hidden');

        // アンケートデータを整理
        const surveyData = {
            type: "survey", 
            gender: gender,   
            age: age,   
            guests: guests,   
            comment: comment,
            deviceId: deviceId 
        };
        
        try {
            // スプレッドシートへ送信（送信完了を同期的に待つ）
            await fetch(GAS_URL, { 
                method: "POST", 
                mode: "no-cors", 
                body: JSON.stringify(surveyData) 
            });
        } catch (e) { 
            console.error(e); 
        }

        // 送信が終わったら、アンケート部分とローディングを隠して、ゲーム一覧を表示
        document.getElementById('survey-fields-container').classList.add('hidden');
        document.getElementById('loading-container').classList.add('hidden');
        document.getElementById('game-list-container').classList.remove('hidden');
    }

    // ゲームがクリックされた時にログを送って画面遷移する関数
    async function clickGameLog(gameName, targetUrl) {
        // アクセスログシートに「②ゲーム選択(ゲーム名)」を送る
        await sendStepLog(`②ゲーム選択(${gameName})`); 
        // ゲーム画面へ遷移
        window.location.href = targetUrl;
    }
</script>
</body>
</html>
