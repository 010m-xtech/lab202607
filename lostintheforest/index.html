<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lost in the Forest</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #e0e0e0;
            font-family: 'Hiragino Mincho ProN', 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        /* 画面全体のタップを検知するレイヤー */
        #tap-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 200; 
            display: none;
            cursor: pointer;
        }

        #game-container {
            position: relative;
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
            z-index: 100; /* テキストやボタンを絶対的な最前面グループへ */
            pointer-events: none; 
            
            /* 【変更】上下中央に並べる設定。少し上に引き上げるためにネガティブマージン（-40px）を設定 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 200px; 
        }

        /* ランタン（サイズは70%基準に可変制御 ＋ 常に微かに揺らめくアニメーションを追加） */
        #lantern {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 1; 
            pointer-events: none;
            transition: all 1.2s ease;
            visibility: hidden;
            animation: flicker 3s infinite alternate;
        }

        @keyframes flicker {
            0% { transform: translate(-50%, -50%) scale(1.0); opacity: 0.95; }
            25% { transform: translate(-49%, -51%) scale(0.98); opacity: 1.0; }
            50% { transform: translate(-51%, -49%) scale(1.02); opacity: 0.93; }
            75% { transform: translate(-50%, -50%) scale(0.97); opacity: 0.97; }
            100% { transform: translate(-49%, -49%) scale(1.01); opacity: 1.0; }
        }

        #text-area {
            font-size: 1.15rem;
            line-height: 2.0;
            min-height: 180px;
            margin-bottom: 20px;
            letter-spacing: 0.12rem;
            text-shadow: 0 4px 8px rgba(0,0,0,1), 0 0 15px rgba(0,0,0,0.9);
            text-align: left;
            position: relative;
            z-index: 110; /* 血しぶき(90)や暗転(95)より絶対に前面 */
            width: 100%;
        }

        .bottom-action-area {
            width: 100%;
            height: 120px; 
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 120; 
        }

        /* タイトル画面用のスタートボタン配置 */
        .title-button-pos {
            width: 70%; 
            max-width: 240px;
            z-index: 150;
            margin: 0 auto;
        }

        .btn-container {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 160; 
        }

        button {
            background-color: rgba(15, 15, 15, 0.85);
            color: #ccc;
            border: 1px solid #555;
            padding: 0 20px;
            font-size: 1.1rem;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            flex: 1;
            height: 65px;
            align-self: center;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            pointer-events: auto; 
            letter-spacing: 0.15rem;
        }

        button:active {
            background-color: rgba(70, 10, 10, 0.9);
            color: #fff;
            border-color: #aa0000;
        }

        #tap-hint {
            position: absolute;
            font-size: 1.05rem;
            color: #aaa;
            letter-spacing: 0.1rem;
            text-shadow: 0 2px 4px rgba(0,0,0,1);
            animation: blink 1.5s infinite;
            display: none;
            z-index: 4;
        }

        /* 【並び順調整】血しぶき（暗転シートの背面、テキストの背面） */
        #blood-splatter {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(130,0,0,0.8) 0%, rgba(40,0,0,0.95) 70%, rgba(0,0,0,1) 100%);
            z-index: 90; /* 暗転(95)より下、テキスト(110)より下 */
            opacity: 0;
            pointer-events: none;
            display: none;
        }

        /* 漆黒の暗転シート */
        #black-out {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 95; /* 背景や血しぶき(90)よりも上に被せて完全に隠す */
            opacity: 0;
            pointer-events: none;
            display: none;
            transition: opacity 2.5s ease-in-out; 
        }

        .splatter-animation { 
            display: block !important; 
            animation: blood-flash 0.6s forwards; 
        }

        @keyframes blood-flash { 
            0% { opacity: 0; transform: scale(1.3); } 
            100% { opacity: 1; transform: scale(1.0); } 
        }

        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
        .panic-animation { animation: shake 0.4s both, flash-red 0.4s ease-out; }
        @keyframes shake { 10%, 90% { transform: translate3d(-3px, 0, 0); } 20%, 80% { transform: translate3d(5px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-7px, 0, 0); } }
        @keyframes flash-red { 0% { background-color: rgba(255, 0, 0, 0); } 50% { background-color: rgba(255, 0, 0, 0.2); } 100% { background-color: rgba(255, 0, 0, 0); } }

        /* 説明文のスタイル（白文字・シャドウ強調・配置調整） */
        .title-description {
            color: #ffffff; 
            text-align: center;
            font-size: 0.95rem;
            line-height: 1.8;
            letter-spacing: 0.08rem;
            text-shadow: 0 2px 4px rgba(0,0,0,1), 0 0 10px rgba(0,0,0,0.8); 
            width: 100%;
            margin-bottom: 10px; /* 【変更】下のボタンとの間に少しだけ余白を作る */
        }
    </style>
</head>
<body>

<div id="tap-overlay" onclick="nextTrigger()"></div>
<div id="blood-splatter"></div>
<div id="black-out"></div>

<div id="game-container">
    <div id="title-text-area" class="title-description"></div>

    <div class="bottom-action-area">
        <div class="btn-container" id="choices"></div>
        <div id="tap-hint">▼ 画面をタップして進む</div>
    </div>
    
    <div id="lantern"></div>
    <div id="text-area"></div>
</div>

<script>
    const IS_TEST_MODE = true; 

    let currentStep = 0;
    let totalSteps = 5;
    let mistakes = 0;
    let maxMistakes = 3;
    let correctPath = [];
    let nextAction = null;
    let typeTimer = null; 

    // BGMシステム用の変数
    let audioCtx = null;
    let bgmInterval = null;
    let currentNoteIndex = 0;
    const spookyMelody = [440, 466, 554, 523, 440, 466, 349, 329, 440, 554, 659, 622, 440, 392, 349, 311];

    const textArea = document.getElementById('text-area');
    const choicesContainer = document.getElementById('choices');
    const lantern = document.getElementById('lantern');
    const tapOverlay = document.getElementById('tap-overlay');
    const tapHint = document.getElementById('tap-hint');
    const bloodSplatter = document.getElementById('blood-splatter');
    const blackOut = document.getElementById('black-out');
    const titleTextArea = document.getElementById('title-text-area');

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playMusic() {
        stopMusic();
        initAudio();
        
        let intervalTime = 500;
        if (mistakes === 1) intervalTime = 380;
        if (mistakes === 2) intervalTime = 260;

        bgmInterval = setInterval(() => {
            if (!audioCtx || audioCtx.state === 'suspended') return;

            let freq = spookyMelody[currentNoteIndex];
            
            let osc = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(0.06, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.2);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 1.2);

            currentNoteIndex = (currentNoteIndex + 1) % spookyMelody.length;
        }, intervalTime);
    }

    function stopMusic() {
        if (bgmInterval) {
            clearInterval(bgmInterval);
            bgmInterval = null;
        }
    }

    function changeBackground(imgName, useTransition = true) {
        if (useTransition) {
            document.body.style.transition = "background-image 1.2s ease-in-out";
        } else {
            document.body.style.transition = "none";
        }
        document.body.style.backgroundImage = `url('${imgName}')`;
    }

    function enableScreenTap(actionFunction) {
        tapOverlay.style.display = 'block';
        tapHint.style.display = 'block';
        nextAction = actionFunction;
    }

    function disableScreenTap() {
        tapOverlay.style.display = 'none';
        tapHint.style.display = 'none';
        nextAction = null;
    }

    function nextTrigger() {
        if (nextAction) {
            const action = nextAction;
            disableScreenTap();
            action();
        }
    }

    function showTitleScreen() {
        stopMusic();
        blackOut.style.display = 'none';
        blackOut.style.opacity = '0';
        bloodSplatter.className = '';
        bloodSplatter.style.display = 'none';
        bloodSplatter.style.opacity = '1';
        
        changeBackground('top.webp', false); 
        lantern.style.visibility = 'hidden';
        textArea.innerHTML = '';

        // 説明文の挿入
        titleTextArea.style.display = 'block';
        titleTextArea.innerHTML = `
            あなたは森に迷い込んでしまった...<br>
            正しい道を${totalSteps}回選択し進めれば脱出成功。<br>
            もし、${maxMistakes}回誤った道を進んでしまうと...
        `;

        // スタートボタンの挿入
        choicesContainer.innerHTML = `
            <div class="title-button-pos">
                <button onclick="preStartGame()"> 森に入る </button>
            </div>
        `;
    }

    function preStartGame() {
        titleTextArea.style.display = 'none';
        titleTextArea.innerHTML = '';

        initAudio();
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        choicesContainer.innerHTML = '';
        blackOut.style.display = 'block';
        blackOut.style.opacity = '1'; 
        
        setTimeout(() => {
            changeBackground('road1.webp', false); 
            lantern.style.visibility = 'hidden'; 
            blackOut.style.opacity = '0';
            
            setTimeout(() => {
                blackOut.style.display = 'none';
                startGame();
            }, 1200);
        }, 1200);
    }

    function startGame() {
        currentStep = 0;
        mistakes = 0;
        correctPath = [];
        currentNoteIndex = 0;
        
        if (IS_TEST_MODE) {
            correctPath = [0, 0, 0, 0, 0];
        } else {
            for (let i = 0; i < totalSteps; i++) {
                correctPath.push(Math.floor(Math.random() * 2));
            }
        }

        bloodSplatter.className = '';
        bloodSplatter.style.display = 'none'; 
        bloodSplatter.style.opacity = '1';
        
        updateLantern();
        playMusic();

        showText("あたりは暗い森の中……<br>ほんのりと灯るランタンの明かりだけが、足元の道を照らしている。<br><br>あなたは歩き始めた。", () => {
            setTimeout(showFork, 1500);
        });
    }

    function updateLantern(forceHide = false) {
        if (forceHide) {
            lantern.style.visibility = 'hidden';
            return;
        }
        lantern.style.visibility = 'visible';
        
        if (mistakes === 0) {
            lantern.style.background = "radial-gradient(circle, rgba(255,180,80,0.6) 0%, rgba(0,0,0,0) 80%)";
            lantern.style.width = "385px";
            lantern.style.height = "385px";
        } else if (mistakes === 1) {
            lantern.style.background = "radial-gradient(circle, rgba(245,130,30,0.5) 0%, rgba(0,0,0,0) 70%)";
            lantern.style.width = "325px";
            lantern.style.height = "325px";
        } else if (mistakes === 2) {
            lantern.style.background = "radial-gradient(circle, rgba(220,60,20,0.4) 0%, rgba(0,0,0,0) 65%)";
            lantern.style.width = "266px";
            lantern.style.height = "266px";
        }
    }

    function showText(text, callback) {
        if (typeTimer) clearInterval(typeTimer);
        textArea.innerHTML = "";
        
        let i = 0;
        typeTimer = setInterval(() => {
            if (i < text.length) {
                if (text.substr(i, 4) === "<br>") {
                    textArea.innerHTML += "<br>";
                    i += 4;
                } else if (text.substr(i, 5) === "<span") {
                    let closeIdx = text.indexOf(">", i);
                    textArea.innerHTML += text.substring(i, closeIdx + 1);
                    i = closeIdx + 1;
                } else {
                    textArea.innerHTML += text.charAt(i);
                    i++;
                }
            } else {
                clearInterval(typeTimer);
                typeTimer = null;
                if (callback) callback();
            }
        }, 45); 
    }

    function showFork() {
        changeBackground('road2.webp', true); 
        updateLantern();
        showText(`（サク、サク、サク……）<br><br>道が二手に分かれている。`, () => {
            setTimeout(() => {
                choicesContainer.innerHTML = `
                    <button onclick="choose(0)">左の道へ</button>
                    <button onclick="choose(1)">右の道へ</button>
                `;
            }, 500);
        });
    }

    function choose(choice) {
        choicesContainer.innerHTML = '';
        disableScreenTap();
        if (choice === correctPath[currentStep]) {
            currentStep++;
            changeBackground('road1.webp', true);
            if (currentStep === totalSteps) {
                showText("（サク、サク、サク……）<br><br>最後の角を曲がり、一本道を進んでいく。すると……", () => {
                    setTimeout(showGoal, 1500);
                });
            } else {
                showText("（サク、サク……）<br><br>正しい道を進んでいるようだ。<br>背後に不穏な気配は無い.", () => {
                    setTimeout(showFork, 1500);
                });
            }
        } else {
            mistakes++;
            triggerPanicEffects();
            
            if (mistakes < maxMistakes) {
                playMusic();
            }
            
            updateLantern();
            if (mistakes >= maxMistakes) {
                stopMusic();
                updateLantern(true); 
                
                bloodSplatter.className = '';
                bloodSplatter.style.transition = "none";
                bloodSplatter.style.opacity = '1';
                bloodSplatter.style.display = 'block';
                bloodSplatter.classList.add('splatter-animation');
                
                showText("（ザザッ！！！）<br><br>背後から凄まじい勢いで【何か】が迫り、あなたのランタンを吹き消した。<br><br>……ここで意識が途絶えた。", () => {
                    setTimeout(() => {
                        textArea.innerHTML = ""; 
                        blackOut.style.display = 'block';
                        blackOut.style.opacity = '0';
                        
                        setTimeout(() => {
                            blackOut.style.opacity = '1';
                        }, 50);
                        
                        setTimeout(() => {
                            bloodSplatter.style.display = 'none'; 
                            bloodSplatter.className = '';
                            
                            setTimeout(() => {
                                showResetButton(); 
                            }, 1000);
                            
                        }, 2500); 
                    }, 1200); 
                });
            } else {
                let warningText = mistakes === 1 ? 
                    "（……サク、サク……ザザッ）<br><br>道を曲がった瞬間、気のせいか、少し後ろから【別の足音】が聞こえた気がした。" :
                    "（ハァ……ハァ……）<br><br>間違いない。闇の中から、あなたの耳元に向けて冷たい呼吸音が近づいてきている。次はない。";
                showText(warningText, () => {
                    setTimeout(showFork, 2000);
                });
            }
        }
    }

    function showGoal() {
        stopMusic();
        updateLantern(true); 
        
        setTimeout(() => {
            changeBackground('road3.webp', true);
            showText("前方に、ぽつんと温かい明かりが見える。<br>山小屋だ！あなたは無事に森を抜け出した。", () => {
                showResetButton();
            });
        }, 800); 
    }

    function triggerPanicEffects() {
        if (navigator.vibrate) navigator.vibrate([150, 100, 150]);
        document.body.classList.add('panic-animation');
        setTimeout(() => document.body.classList.remove('panic-animation'), 400);
    }

    function showResetButton() {
        choicesContainer.innerHTML = `<button onclick="showTitleScreen()" style="width:100%; letter-spacing:0.1rem; padding: 0 15px;">もう一度、森へ入る</button>`;
    }

    window.onload = showTitleScreen;
</script>

</body>
</html>
