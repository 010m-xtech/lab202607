<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LIFT THE TRUCK! - AR Camera</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }

    /* 1. スタート画面 */
    #start-overlay {
  position: fixed; 
  inset: 0; 
  background: url('background.png') no-repeat center center;
  background-size: cover; 
  z-index: 100;
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  justify-content: center; /* ★ center（中央揃え）に変える */
  padding-bottom: 100px;      /* ★ これで中央からさらに「下に100px」ずらす、といった微調整ができます */
}
    .start-btn {
      padding: 20px 40px; background: #ffc107; color: #333; font-size: 1.3em;
      font-weight: bold; border: none; border-radius: 50px; cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    /* カメラ映像のコンテナ */
    #camera-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
    video { width: 100%; height: 100%; object-fit: cover; }

    /* ★動かせるトラック画像（初期配置を完全中央にするため top/left を 50% に修正） */
    #track-frame {
      position: absolute;
      width: 220px; 
      top: 50%; left: 50%; 
      /* translate(-50%, -50%) で画像の中心が画面の完全中央に重なります */
      transform: translate(-50%, -50%) scale(1); 
      touch-action: none;
      cursor: move;
      user-select: none;
      z-index: 10;
      display: none; /* カメラ起動前は隠しておく */
    }

    /* ★【新機能】トラックが右から左へ通り過ぎて中央に止まるアニメーション演出 */
.truck-entrance-animation {
      display: block !important;
      pointer-events: none; /* アニメーション中は指での操作を無効化 */
      animation: truckDriveBy 4.0s linear forwards; /* 動きをスムーズにするため少し時間を調整 */
    }

    @keyframes truckDriveBy {
      0% {
        left: 150%; /* 始まり：画面の遥か右外側 */
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.2);
      }
      30% {
        left: -50%; /* 1回目：猛スピードで左外側へ走り去る */
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.2);
      }
      31% {
        left: -50%;
        opacity: 0; /* ★左に消えた瞬間に、一瞬で透明にする！ */
        transform: translate(-50%, -50%) scale(1);
      }
      35% {
        left: 150%; /* ★透明な状態のまま、こっそり右外側へワープ！ */
        opacity: 0;
        transform: translate(-50%, -50%) scale(1);
      }
      45% {
        left: 150%;
        opacity: 1; /* ★右外側に到着してから、姿を現す！ */
        transform: translate(-50%, -50%) scale(1);
      }
      100% {
        left: 50%; /* 2回目：右から入ってきて、画面の完全中央（50%）で静かに止まる */
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    /* 触ると消える案内メッセージ */
    #guide-message {
      position: absolute;
      top: 20%; left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      padding: 15px 20px;
      border-radius: 15px;
      font-size: 13px;
      line-height: 1.5;
      width: 85%;
      max-width: 320px;
      text-align: center;
      z-index: 20;
      pointer-events: none; 
      opacity: 0; /* 最初は透明にしておき、トラックが止まったら出す */
      transition: opacity 0.5s ease;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* カメラ画面の右下のロゴ */
#camera-logo-overlay {
  position: absolute;
  bottom: 3%;
  right: 3%;
  width: 25%;        /* ★ 15% から 25%（または30%）に大きくする */
  max-width: 150px;  /* ★ 80px から 150px に引き上げる（ブレーキを解除） */
  z-index: 12;
  pointer-events: none;
  opacity: 0.8;
}

    /* シャッターボタンエリア */
    .controls {
      position: absolute; bottom: 30px; left: 0; width: 100%;
      display: flex; justify-content: center; align-items: center; z-index: 15;
    }
    .shutter-btn {
      width: 75px; height: 75px; background: white; border: 5px solid #ccc;
      border-radius: 50%; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    /* 撮影後のプレビュー画面 */
    #photo-preview-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 50;
      display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
    }
    #captured-image { max-width: 100%; max-height: 70%; border-radius: 10px; box-shadow: 0 4px 20px rgba(255,255,255,0.2); }
    .preview-btns { margin-top: 20px; display: flex; gap: 20px; }
    .sub-btn { padding: 12px 25px; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 1em; }
    .retake { background: #555; color: white; }
    .save-msg { color: #aaa; font-size: 12px; margin-top: 15px; text-align: center; line-height: 1.4; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="start-overlay">
    <button class="start-btn" onclick="startCamera()">LIFT THE TRUCK!</button>
  </div>

  <div id="camera-container" ontouchstart="dismissGuide()">
    <video id="video" autoplay playsinline></video>
    
    <div id="guide-message">
      🚚 トラックをスワイプで移動、<br>ピンチ（指2本）で拡大・縮小できるよ！<br>いろんなポーズで写真を撮ってシェアしよう！
    </div>
    
    <img id="track-frame" src="image.png" alt="トラック">
    
    <img id="camera-logo-overlay" src="rogo.png" alt="ロゴ">

    <div class="controls">
      <button class="shutter-btn" onclick="takePhoto()"></button>
    </div>
  </div>

  <div id="photo-preview-overlay" class="hidden">
    <h3 style="color: white; margin-bottom: 15px;">いい写真が撮れたかな？</h3>
    <img id="captured-image" src="" alt="撮影された写真">
    <div class="preview-btns">
      <button class="sub-btn retake" onclick="retakePhoto()">もう一度撮る</button>
    </div>
    <p class="save-msg">※上の写真を長押ししてスマホに保存してね！</p>
  </div>

  <canvas id="canvas" class="hidden"></canvas>

  <script>
    const video = document.getElementById('video');
    const track = document.getElementById('track-frame');
    const guide = document.getElementById('guide-message');
    const logoImg = document.getElementById('camera-logo-overlay');
    
    let currentScale = 1;
    let startDist = 0;
    let posX = 0, posY = 0; // スワイプで移動した「ズレ（差分）」を記録する変数に変更
    let startX = 0, startY = 0;
    let isAnimationFinished = false; // アニメーションが終わったかどうかのフラグ

    // カメラ起動処理
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" }, 
          audio: false
        });
        video.srcObject = stream;
        document.getElementById('start-overlay').classList.add('hidden');
        
        // ★演出スタート：トラックにアニメーション用のCSSクラスを付与
        track.classList.add('truck-entrance-animation');
        
// ★アニメーション（4.0秒）が終わった瞬間の処理
        setTimeout(() => {
          isAnimationFinished = true;
          track.classList.remove('truck-entrance-animation'); 
          track.style.display = 'block'; 
          track.style.pointerEvents = 'auto'; // 指での操作を解禁！
          
          if (guide) guide.style.opacity = '1';
        }, 4000);

      } catch (err) {
        alert("カメラの起動に失敗しました。ブラウザの設定でカメラのアクセス権限を許可してください。");
        console.error(err);
      }
    }

    // 案内メッセージを消す関数
    function dismissGuide() {
      if (guide && !guide.classList.contains('hidden')) {
        guide.style.opacity = '0'; 
        setTimeout(() => {
          guide.classList.add('hidden'); 
        }, 500);
      }
    }

    // ──────────────────────────────────────────────────────────
    // ★ トラック画像の操作（完全中央基準にアップデート）
    // ──────────────────────────────────────────────────────────
    function getDistance(touches) {
      return Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
    }

    track.addEventListener('touchstart', (e) => {
      if (!isAnimationFinished) return; // アニメーション中は触らせない
      dismissGuide(); 
      if (e.touches.length === 1) {
        // 中央(50%, 50%)からの移動差分を計算
        startX = e.touches[0].clientX - posX;
        startY = e.touches[0].clientY - posY;
      } else if (e.touches.length === 2) {
        startDist = getDistance(e.touches);
      }
    });

    track.addEventListener('touchmove', (e) => {
      if (!isAnimationFinished) return; // アニメーション中は動かせない
      e.preventDefault(); 

      if (e.touches.length === 1) {
        posX = e.touches[0].clientX - startX;
        posY = e.touches[0].clientY - startY;
      } else if (e.touches.length === 2) {
        const dist = getDistance(e.touches);
        const scaleFactor = dist / startDist;
        currentScale = Math.min(Math.max(currentScale * scaleFactor, 0.2), 4.0); 
        startDist = dist;
      }
      updateTransform();
    });

    function updateTransform() {
      // 完全中央の位置（translate(-50%, -50%)）を維持したまま、指で動かした距離（posX, posY）分だけずらす
      track.style.transform = `translate(-50%, -50%) translate(${posX}px, ${posY}px) scale(${currentScale})`;
    }

    // ──────────────────────────────────────────────────────────
    // ★ 写真撮影 ＆ 合成処理
    // ──────────────────────────────────────────────────────────
    function takePhoto() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const videoRect = video.getBoundingClientRect();
      const trackRect = track.getBoundingClientRect();

      const scaleX = canvas.width / videoRect.width;
      const scaleY = canvas.height / videoRect.height;

      const drawX = (trackRect.left - videoRect.left) * scaleX;
      const drawY = (trackRect.top - videoRect.top) * scaleY;
      const drawWidth = trackRect.width * scaleX;
      const drawHeight = trackRect.height * scaleY;

      ctx.drawImage(track, drawX, drawY, drawWidth, drawHeight);

      const logoWidth = canvas.width * 0.15; 
      const logoHeight = (logoImg.naturalHeight / logoImg.naturalWidth) * logoWidth;
      
      const margin = canvas.width * 0.03; 
      const logoX = canvas.width - logoWidth - margin;
      const logoY = canvas.height - logoHeight - margin;

      ctx.drawImage(logoImg, logoX, logoY, logoWidth, logoHeight);

      const dataUrl = canvas.toDataURL('image/png');
      document.getElementById('captured-image').src = dataUrl;
      document.getElementById('photo-preview-overlay').classList.remove('hidden');
    }

    function retakePhoto() {
      document.getElementById('photo-preview-overlay').classList.add('hidden');
    }
  </script>
</body>
</html>
